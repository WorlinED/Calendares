<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Календарь</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600;700&family=Golos+Text:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a24;
    --surface2: #22222f;
    --accent: #7c6af7;
    --accent2: #f76a8a;
    --text: #f0eeff;
    --muted: #6b6880;
    --today-bg: linear-gradient(135deg, #7c6af7, #f76a8a);
    --event-dot: #f76a8a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Golos Text', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .app {
    max-width: 420px;
    margin: 0 auto;
    padding: 16px;
    padding-bottom: 32px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    padding-top: 8px;
  }

  .month-nav {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .nav-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--surface);
    border: none;
    color: var(--text);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    transition: background 0.2s, transform 0.1s;
  }
  .nav-btn:active { transform: scale(0.9); background: var(--surface2); }

  .month-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.5px;
    min-width: 160px;
    text-align: center;
  }

  .year-badge {
    font-family: 'Unbounded', sans-serif;
    font-size: 11px;
    font-weight: 300;
    color: var(--muted);
    background: var(--surface);
    padding: 4px 10px;
    border-radius: 20px;
  }

  /* Calendar grid */
  .calendar {
    background: var(--surface);
    border-radius: 20px;
    padding: 16px;
    margin-bottom: 20px;
  }

  .weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    margin-bottom: 8px;
  }

  .weekday {
    text-align: center;
    font-size: 11px;
    font-family: 'Unbounded', sans-serif;
    font-weight: 400;
    color: var(--muted);
    padding: 4px 0;
    letter-spacing: 0.5px;
  }
  .weekday.weekend { color: var(--accent2); opacity: 0.7; }

  .days-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }

  .day-cell {
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    cursor: pointer;
    position: relative;
    transition: background 0.15s, transform 0.1s;
    gap: 2px;
  }

  .day-cell:active { transform: scale(0.88); }

  .day-num {
    font-size: 14px;
    font-family: 'Golos Text', sans-serif;
    font-weight: 500;
    line-height: 1;
  }

  .day-cell.empty { cursor: default; }
  .day-cell.empty:active { transform: none; }

  .day-cell.other-month .day-num { color: var(--muted); opacity: 0.4; }

  .day-cell.weekend .day-num { color: var(--accent2); }

  .day-cell.today {
    background: var(--today-bg);
  }
  .day-cell.today .day-num { color: #fff; font-weight: 700; }

  .day-cell.selected:not(.today) {
    background: var(--surface2);
    outline: 2px solid var(--accent);
  }

  .day-cell:not(.empty):not(.today):hover {
    background: var(--surface2);
  }

  .events-dots {
    display: flex;
    gap: 2px;
    justify-content: center;
  }
  .dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--event-dot);
  }
  .day-cell.today .dot { background: rgba(255,255,255,0.8); }

  /* Selected date info */
  .selected-info {
    background: var(--surface);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    animation: slideUp 0.2s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .selected-date-text {
    font-family: 'Unbounded', sans-serif;
    font-size: 14px;
    font-weight: 400;
  }

  .add-event-btn {
    background: var(--today-bg);
    border: none;
    color: #fff;
    font-family: 'Golos Text', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: 20px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .add-event-btn:active { opacity: 0.8; transform: scale(0.96); }

  /* Events list */
  .events-section {
    margin-bottom: 20px;
  }

  .section-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 12px;
    font-weight: 400;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .event-item {
    background: var(--surface);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 14px;
    animation: slideUp 0.2s ease;
  }

  .event-color {
    width: 4px;
    height: 40px;
    border-radius: 4px;
    background: var(--today-bg);
    flex-shrink: 0;
  }

  .event-color.blue { background: linear-gradient(135deg, #6af7d4, #6ab5f7); }
  .event-color.orange { background: linear-gradient(135deg, #f7a96a, #f7d46a); }

  .event-content { flex: 1; }

  .event-title {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 2px;
  }

  .event-time {
    font-size: 12px;
    color: var(--muted);
  }

  .event-delete {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    padding: 4px;
    border-radius: 6px;
    transition: color 0.2s;
  }
  .event-delete:hover { color: var(--accent2); }

  .no-events {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 24px;
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px);
    z-index: 100;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    padding: 24px 20px 40px;
    width: 100%;
    max-width: 420px;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .modal-overlay.open .modal {
    transform: translateY(0);
  }

  .modal-handle {
    width: 40px; height: 4px;
    background: var(--muted);
    border-radius: 2px;
    margin: 0 auto 20px;
    opacity: 0.4;
  }

  .modal-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 20px;
  }

  .input-group {
    margin-bottom: 16px;
  }

  .input-label {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
    font-family: 'Unbounded', sans-serif;
    font-weight: 300;
    letter-spacing: 0.5px;
  }

  .input-field {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid transparent;
    border-radius: 12px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'Golos Text', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-field:focus { border-color: var(--accent); }
  .input-field::placeholder { color: var(--muted); }

  .color-picker {
    display: flex;
    gap: 10px;
  }

  .color-opt {
    width: 28px; height: 28px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.15s, border-color 0.15s;
  }
  .color-opt:active { transform: scale(0.9); }
  .color-opt.selected { border-color: white; transform: scale(1.15); }
  .color-opt.pink { background: linear-gradient(135deg, #7c6af7, #f76a8a); }
  .color-opt.teal { background: linear-gradient(135deg, #6af7d4, #6ab5f7); }
  .color-opt.orange { background: linear-gradient(135deg, #f7a96a, #f7d46a); }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }

  .btn-cancel {
    flex: 1;
    padding: 14px;
    border-radius: 14px;
    background: var(--surface2);
    border: none;
    color: var(--muted);
    font-family: 'Golos Text', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-cancel:active { background: var(--bg); }

  .btn-save {
    flex: 2;
    padding: 14px;
    border-radius: 14px;
    background: var(--today-bg);
    border: none;
    color: white;
    font-family: 'Unbounded', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn-save:active { opacity: 0.85; transform: scale(0.97); }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="month-nav">
      <button class="nav-btn" id="prevBtn">‹</button>
      <div class="month-title" id="monthTitle"></div>
      <button class="nav-btn" id="nextBtn">›</button>
    </div>
    <div class="year-badge" id="yearBadge"></div>
  </div>

  <div class="calendar">
    <div class="weekdays">
      <div class="weekday">ПН</div>
      <div class="weekday">ВТ</div>
      <div class="weekday">СР</div>
      <div class="weekday">ЧТ</div>
      <div class="weekday">ПТ</div>
      <div class="weekday weekend">СБ</div>
      <div class="weekday weekend">ВС</div>
    </div>
    <div class="days-grid" id="daysGrid"></div>
  </div>

  <div class="selected-info" id="selectedInfo">
    <div class="selected-date-text" id="selectedDateText"></div>
    <button class="add-event-btn" id="addEventBtn">+ Добавить</button>
  </div>

  <div class="events-section">
    <div class="section-title">События</div>
    <div id="eventsList"></div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Новое событие</div>
    <div class="input-group">
      <div class="input-label">НАЗВАНИЕ</div>
      <input class="input-field" id="eventTitle" placeholder="Встреча, день рождения...">
    </div>
    <div class="input-group">
      <div class="input-label">ВРЕМЯ</div>
      <input class="input-field" id="eventTime" type="time">
    </div>
    <div class="input-group">
      <div class="input-label">ЦВЕТ</div>
      <div class="color-picker">
        <div class="color-opt pink selected" data-color="pink"></div>
        <div class="color-opt teal" data-color="teal"></div>
        <div class="color-opt orange" data-color="orange"></div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="cancelBtn">Отмена</button>
      <button class="btn-save" id="saveBtn">СОХРАНИТЬ</button>
    </div>
  </div>
</div>

<script>
// Telegram WebApp init
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  tg.setHeaderColor('#0f0f13');
  tg.setBackgroundColor('#0f0f13');
}

const MONTHS = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];

let currentDate = new Date();
let selectedDate = new Date();
let selectedColor = 'pink';

// Events storage
let events = JSON.parse(localStorage.getItem('tg_calendar_events') || '{}');

function saveEvents() {
  localStorage.setItem('tg_calendar_events', JSON.stringify(events));
}

function getDateKey(d) {
  return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
}

function formatSelectedDate(d) {
  const days = ['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];
  return `${d.getDate()} ${MONTHS[d.getMonth()].toLowerCase()}, ${days[d.getDay()]}`;
}

function renderCalendar() {
  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();

  document.getElementById('monthTitle').textContent = MONTHS[month];
  document.getElementById('yearBadge').textContent = year;

  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);

  // Monday-based offset
  let startOffset = firstDay.getDay() - 1;
  if (startOffset < 0) startOffset = 6;

  const today = new Date();
  const grid = document.getElementById('daysGrid');
  grid.innerHTML = '';

  // Prev month padding
  for (let i = 0; i < startOffset; i++) {
    const d = new Date(year, month, -startOffset + i + 1);
    const cell = createDayCell(d, true);
    grid.appendChild(cell);
  }

  // Current month
  for (let d = 1; d <= lastDay.getDate(); d++) {
    const date = new Date(year, month, d);
    const cell = createDayCell(date, false);
    grid.appendChild(cell);
  }

  // Next month padding
  const totalCells = startOffset + lastDay.getDate();
  const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  for (let i = 1; i <= remaining; i++) {
    const d = new Date(year, month + 1, i);
    const cell = createDayCell(d, true);
    grid.appendChild(cell);
  }

  renderSelectedInfo();
}

function createDayCell(date, otherMonth) {
  const cell = document.createElement('div');
  cell.className = 'day-cell';

  if (otherMonth) cell.classList.add('other-month');

  const today = new Date();
  const isToday = date.toDateString() === today.toDateString();
  const isSelected = date.toDateString() === selectedDate.toDateString();
  const isWeekend = date.getDay() === 0 || date.getDay() === 6;

  if (isToday) cell.classList.add('today');
  if (isSelected) cell.classList.add('selected');
  if (isWeekend && !otherMonth) cell.classList.add('weekend');

  const numEl = document.createElement('div');
  numEl.className = 'day-num';
  numEl.textContent = date.getDate();
  cell.appendChild(numEl);

  // Event dots
  const key = getDateKey(date);
  if (events[key] && events[key].length > 0) {
    const dotsEl = document.createElement('div');
    dotsEl.className = 'events-dots';
    const count = Math.min(events[key].length, 3);
    for (let i = 0; i < count; i++) {
      const dot = document.createElement('div');
      dot.className = 'dot';
      dotsEl.appendChild(dot);
    }
    cell.appendChild(dotsEl);
  }

  cell.addEventListener('click', () => {
    selectedDate = new Date(date);
    renderCalendar();
  });

  return cell;
}

function renderSelectedInfo() {
  document.getElementById('selectedDateText').textContent = formatSelectedDate(selectedDate);
  renderEvents();
}

function renderEvents() {
  const key = getDateKey(selectedDate);
  const dayEvents = events[key] || [];
  const list = document.getElementById('eventsList');
  list.innerHTML = '';

  if (dayEvents.length === 0) {
    list.innerHTML = '<div class="no-events">Нет событий на этот день</div>';
    return;
  }

  dayEvents.forEach((ev, idx) => {
    const item = document.createElement('div');
    item.className = 'event-item';
    item.innerHTML = `
      <div class="event-color ${ev.color}"></div>
      <div class="event-content">
        <div class="event-title">${ev.title}</div>
        <div class="event-time">${ev.time || 'Весь день'}</div>
      </div>
      <button class="event-delete" data-idx="${idx}">×</button>
    `;
    list.appendChild(item);
  });

  list.querySelectorAll('.event-delete').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const i = parseInt(e.target.dataset.idx);
      events[key].splice(i, 1);
      if (events[key].length === 0) delete events[key];
      saveEvents();
      renderCalendar();
    });
  });
}

// Modal
const modal = document.getElementById('modalOverlay');

document.getElementById('addEventBtn').addEventListener('click', () => {
  modal.classList.add('open');
  document.getElementById('eventTitle').focus();
});

document.getElementById('cancelBtn').addEventListener('click', closeModal);
modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

function closeModal() {
  modal.classList.remove('open');
  document.getElementById('eventTitle').value = '';
  document.getElementById('eventTime').value = '';
}

// Color picker
document.querySelectorAll('.color-opt').forEach(opt => {
  opt.addEventListener('click', () => {
    document.querySelectorAll('.color-opt').forEach(o => o.classList.remove('selected'));
    opt.classList.add('selected');
    selectedColor = opt.dataset.color;
  });
});

document.getElementById('saveBtn').addEventListener('click', () => {
  const title = document.getElementById('eventTitle').value.trim();
  if (!title) {
    document.getElementById('eventTitle').style.borderColor = '#f76a8a';
    setTimeout(() => document.getElementById('eventTitle').style.borderColor = '', 800);
    return;
  }
  const time = document.getElementById('eventTime').value;
  const key = getDateKey(selectedDate);
  if (!events[key]) events[key] = [];
  events[key].push({ title, time, color: selectedColor });
  events[key].sort((a, b) => (a.time || '99:99').localeCompare(b.time || '99:99'));
  saveEvents();
  closeModal();
  renderCalendar();

  if (tg) tg.HapticFeedback?.notificationOccurred('success');
});

// Navigation
document.getElementById('prevBtn').addEventListener('click', () => {
  currentDate.setMonth(currentDate.getMonth() - 1);
  renderCalendar();
});
document.getElementById('nextBtn').addEventListener('click', () => {
  currentDate.setMonth(currentDate.getMonth() + 1);
  renderCalendar();
});

renderCalendar();
</script>
</body>
</html>
